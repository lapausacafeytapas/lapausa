<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La PAUsa</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<section id="inicio" class="screen active">
<picture class="hero">
  <source media="(max-width:768px)" srcset="img/hero-mobile.webp">
  <img src="img/hero.webp" alt="">
</picture>
<div class="overlay"></div>
<div class="content hero-content">
  <img src="img/logo.png" class="logo" alt="La PAUsa">
  <h1>La PAUsa que tu día necesita.</h1>
  <p>Un rincón donde el café, el sabor y la buena compañía se encuentran.</p>
  <button onclick="mostrarCarta()">VER CARTA</button>
</div>
<nav class="bottom-bar">
  <a id="mapsIcon" href="#" target="_blank" rel="noopener noreferrer" aria-label="Ubicación en Google Maps"><i class="fa-solid fa-location-dot"></i></a>
  <a id="instagramIcon" href="#" target="_blank" rel="noopener noreferrer" aria-label="Instagram de La PAUsa"><i class="fa-brands fa-instagram"></i></a>
  <a id="facebookIcon" href="#" target="_blank" rel="noopener noreferrer" aria-label="Facebook de La PAUsa"><i class="fa-brands fa-facebook-f"></i></a>
  <a id="whatsappIcon" href="#" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp de La PAUsa"><i class="fa-brands fa-whatsapp"></i></a>
</nav>
</section>

<section id="carta" class="screen">
  <header class="premium-header">
    <button onclick="volverCarta()">← Volver</button>
    <h2 id="titulo-carta">Nuestra Carta</h2>
  </header>

  <nav id="categorias-menu" class="categorias"></nav>
  <nav id="subcategorias-menu" class="subcategorias oculto"></nav>
  <div id="productos-view" class="oculto"></div>
</section>

<script src="datos.js?v=20260705-2"></script>
<script src="script.js?v=20260705-2"></script>
</body>
</html>
