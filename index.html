<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La PAUsa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section id="inicio" class="screen active">

<picture class="hero">
  <source media="(max-width:768px)" srcset="img/hero-mobile.webp">
  <img src="img/hero.webp" alt="">
</picture>

<div class="overlay"></div>

<div class="content">
  <img src="img/logo.png" class="logo" alt="La PAUsa">

  <h1>La PAUsa que tu día necesita.</h1>

  <p>Un rincón donde el café, el sabor y la buena compañía se encuentran.</p>

  <button onclick="mostrarCarta()">VER CARTA</button>
</div>

</section>

<section id="carta" class="screen">

<header class="premium-header">
<button onclick="mostrarInicio()">← Inicio</button>
<h2>Nuestra Carta</h2>
</header>

<nav class="categorias">
<button class="active-cat" onclick="cat('mananas',this)">La PAUsa de las mañanas</button>
<button onclick="cat('tardes',this)">La PAUsa de las tardes</button>
<button onclick="cat('viernesysabado',this)">La PAUsa de las noches</button>
<button onclick="cat('cafes',this)">Cafes</button>
<button onclick="cat('bebidas',this)">Bebidas</button>
</nav>

<div id="mananas-container" class="categorias-container">
  <nav class="subcategorias">
    <button class="active-subcat" onclick="subcat('desayunos',this)">Desayunos</button>
    <button onclick="subcat('almuerzos',this)">Almuerzos</button>
    <button onclick="subcat('menudeldia',this)">Menú del día</button>
  </nav>
  <div id="desayunos-subcont" class="subcategorias-container"></div>
  <div id="almuerzos-subcont" class="subcategorias-container oculto"></div>
  <div id="menudeldia-subcont" class="subcategorias-container oculto"></div>
</div>
<div id="tardes-container" class="categorias-container oculto"></div>
<div id="viernesysabado-container" class="categorias-container oculto"></div>
<div id="cafes-container" class="categorias-container oculto"></div>

<div id="bebidas-container" class="categorias-container oculto">
  <nav class="subcategorias">
    <button class="active-subcat" onclick="subcat('refrescos',this)">Refrescos</button>
    <button onclick="subcat('cervezas',this)">Cervezas</button>
    <button onclick="subcat('blancos',this)">Vino blanco</button>
    <button onclick="subcat('tintos',this)">Vino tinto</button>
    <button onclick="subcat('copas',this)">Copas</button>
    <button onclick="subcat('combinados',this)">Combinados</button>
  </nav>
  <div id="refrescos-subcont" class="subcategorias-container"></div>
  <div id="cervezas-subcont" class="subcategorias-container oculto"></div>
  <div id="blancos-subcont
